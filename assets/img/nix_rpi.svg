<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="nixA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5277C3"/>
      <stop offset="1" stop-color="#7EBAE4"/>
    </linearGradient>
    <linearGradient id="nixB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7EBAE4"/>
      <stop offset="1" stop-color="#5277C3"/>
    </linearGradient>
    <linearGradient id="berry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C51A4A"/>
      <stop offset="1" stop-color="#8C1236"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#75B94E"/>
      <stop offset="1" stop-color="#3E8B2E"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" fill="#ffffff"/>

  <!-- NixOS snowflake: 6 arms at 60°. Each arm = two overlapping parallelograms (light + dark) -->
  <g transform="translate(180 200)">
    <g id="arm">
      <!-- arm pointing along +X; two parallelograms crossing into a chevron -->
      <polygon points="18,-6 82,-6 92,10 28,10" fill="url(#nixA)"/>
      <polygon points="18,6 82,6 92,-10 28,-10" fill="url(#nixB)"/>
    </g>
    <use href="#arm" transform="rotate(60)"/>
    <use href="#arm" transform="rotate(120)"/>
    <use href="#arm" transform="rotate(180)"/>
    <use href="#arm" transform="rotate(240)"/>
    <use href="#arm" transform="rotate(300)"/>
  </g>

  <!-- Plus separator -->
  <g transform="translate(320 200)" fill="#444">
    <rect x="-18" y="-4" width="36" height="8" rx="2"/>
    <rect x="-4" y="-18" width="8" height="36" rx="2"/>
  </g>

  <!-- Raspberry: cluster of drupelets + leaves -->
  <g transform="translate(460 210)">
    <!-- leaves -->
    <g transform="translate(0 -85)">
      <path d="M0,0 C-30,-40 -70,-35 -80,-10 C-50,-5 -20,5 0,10 Z" fill="url(#leaf)"/>
      <path d="M0,0 C30,-40 70,-35 80,-10 C50,-5 20,5 0,10 Z" fill="url(#leaf)"/>
      <path d="M0,-5 C-8,-45 8,-45 0,-5 Z" fill="#5BA33E"/>
    </g>
    <!-- drupelets: cluster of circles -->
    <g fill="url(#berry)">
      <circle cx="-30" cy="-50" r="18"/>
      <circle cx="0"   cy="-55" r="18"/>
      <circle cx="30"  cy="-50" r="18"/>
      <circle cx="-40" cy="-20" r="18"/>
      <circle cx="-12" cy="-22" r="18"/>
      <circle cx="16"  cy="-22" r="18"/>
      <circle cx="42"  cy="-20" r="18"/>
      <circle cx="-28" cy="10"  r="18"/>
      <circle cx="4"   cy="12"  r="18"/>
      <circle cx="32"  cy="10"  r="18"/>
      <circle cx="-10" cy="40"  r="18"/>
      <circle cx="20"  cy="40"  r="18"/>
      <circle cx="6"   cy="65"  r="16"/>
    </g>
    <!-- drupelet highlights -->
    <g fill="#E04B6E" opacity="0.55">
      <circle cx="-34" cy="-54" r="5"/>
      <circle cx="-4"  cy="-59" r="5"/>
      <circle cx="26"  cy="-54" r="5"/>
      <circle cx="-44" cy="-24" r="5"/>
      <circle cx="-16" cy="-26" r="5"/>
      <circle cx="12"  cy="-26" r="5"/>
      <circle cx="38"  cy="-24" r="5"/>
      <circle cx="-32" cy="6"   r="5"/>
      <circle cx="0"   cy="8"   r="5"/>
      <circle cx="28"  cy="6"   r="5"/>
      <circle cx="-14" cy="36"  r="5"/>
      <circle cx="16"  cy="36"  r="5"/>
    </g>
  </g>
</svg>
